<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- title section start -->

    <title>Tea House</title>

    <!-- title section end -->

    <!-- google font link start -->

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- google font link end -->

    <!-- fontawesome link start -->

    <script src="https://kit.fontawesome.com/f6f4349f8f.js" crossorigin="anonymous"></script>

    <!-- fontawesome link end -->

    <!-- tailwind css & daisy ui cdn start -->

    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.4.23/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- tailwind css & daisy ui cdn end -->

    <!-- tailwind customize start -->

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'web-title': '#1C1C1C',
                        'web-semi-title': '#777777',
                    }
                }
            }
        }
    </script>

    <!-- tailwind customize end -->

    <!-- external css file link start -->

    <link rel="stylesheet" href="css/style.css">

    <!-- external css file link end -->

</head>

<body class="font-manrope">

    <!-- header section start -->

    <header class="container mx-auto pt-12">

        <!-- banner section start -->

        <div class="hero">
            <div class="hero-content flex-col lg:flex-row md:gap-40 lg:gap-40">
                <div>
                    <h1 class="text-7xl font-extrabold text-web-title">It's good <br>
                        tea time at The <br> Tea House</h1>
                    <p class="py-6 text-lg font-medium text-web-semi-title">Tea and Botanical Solutions Supplier Give
                        Optimum <br>
                        Satisfaction To Your
                        Taste
                        Buds.
                    </p>
                    <button class="btn bg-gradient-to-r from-[#FF8938] to-[#F00] text-white">Explore
                        More</button>
                </div>
                <div>
                    <img src="images/banner.png" alt="banner-img" class="max-w-sm rounded-lg" />

                    <div class="-mt-16 flex items-center gap-[13px] bg-white drop-shadow-md p-5 w-64 rounded-[10px]">
                        <div>
                            <i class="fa-solid fa-star text-3xl text-amber-400"></i>
                        </div>
                        <div>
                            <h3 class="text-web-title text-3xl font-extrabold">5.00</h3>
                            <p class="text-web-semi-title text-base font-semibold">Trust Pilot Ratings</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- banner section end -->

    </header>

    <!-- header section end -->

</body>

</html>
